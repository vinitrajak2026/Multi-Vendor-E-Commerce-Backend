<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Flipazon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'flipazon/dashboard.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        
        .error-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(239, 68, 68, 0.2);
            box-shadow: var(--shadow-xl);
            padding: 3rem 2.5rem;
            text-align: center;
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .error-icon {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-full);
            background-color: #fee2e2;
            color: #ef4444;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

<div class="error-card">
    <div class="error-icon">
        <i data-lucide="alert-octagon" style="width: 42px; height: 42px; stroke-width: 2;"></i>
    </div>
    
    <h3 class="fw-bold text-slate-900 mb-2" style="letter-spacing: -0.02em;">Oops! Something went wrong</h3>
    <p class="text-danger mb-4" style="font-size: 1.05rem;">{{ message }}</p>
    
    <button onclick="window.history.back()" class="btn-premium btn-seller w-100 py-3 d-flex align-items-center justify-content-center gap-2" style="background: var(--customer-gradient);">
        <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
        <span>Go Back</span>
    </button>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
