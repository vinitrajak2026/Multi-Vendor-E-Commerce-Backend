<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Review - Flipazon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'flipazon/dashboard.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-light">

<!-- Sticky Header Navigation -->
<nav class="sub-navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="/flipazon/customer-dashboard/" class="sub-nav-brand">
            <i data-lucide="shopping-bag" class="text-teal" style="color: var(--customer-primary);"></i>
            <span class="fw-bold">Flipazon</span>
        </a>
        <div class="sub-nav-links">
            <a href="/flipazon/customer-dashboard/" class="sub-nav-link">
                <i data-lucide="layout-dashboard" style="width: 16px; height: 16px;"></i>
                <span>Dashboard</span>
            </a>
            <a href="/flipazon/all-products/" class="sub-nav-link active" style="color: var(--customer-primary); font-weight: 600;">
                <i data-lucide="store" style="width: 16px; height: 16px;"></i>
                <span>Market</span>
            </a>
            <a href="/flipazon/view-cart/" class="sub-nav-link">
                <i data-lucide="shopping-cart" style="width: 16px; height: 16px;"></i>
                <span>Cart</span>
            </a>
            <a href="/flipazon/view-wishlist/" class="sub-nav-link">
                <i data-lucide="heart" style="width: 16px; height: 16px;"></i>
                <span>Wishlist</span>
            </a>
            <a href="/flipazon/view-orders/" class="sub-nav-link">
                <i data-lucide="package" style="width: 16px; height: 16px;"></i>
                <span>Orders</span>
            </a>
            <a href="/flipazon/logout/" class="btn-premium btn-danger-custom btn-sm" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">
                <i data-lucide="log-out" style="width: 14px; height: 14px;"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>
</nav>

<div class="container animate-fade-in mb-5">
    <div class="max-width-600 mx-auto" style="max-width: 600px;">
        <div class="custom-card">
            <div class="d-flex align-items-center gap-2 mb-4">
                <i data-lucide="edit-3" class="text-teal" style="width: 24px; height: 24px; color: var(--customer-primary);"></i>
                <h3 class="fw-bold m-0" style="font-size: 1.25rem;">Write Product Review</h3>
            </div>

            <form method="post" class="customer-form">
                {% csrf_token %}

                <div class="mb-3 form-group">
                    <label for="rating" class="form-label">Product Rating</label>
                    <select id="rating" name="rating" class="form-control">
                        <option value="5">⭐⭐⭐⭐⭐ (5 - Excellent)</option>
                        <option value="4">⭐⭐⭐⭐ (4 - Very Good)</option>
                        <option value="3">⭐⭐⭐ (3 - Average)</option>
                        <option value="2">⭐⭐ (2 - Poor)</option>
                        <option value="1">⭐ (1 - Terrible)</option>
                    </select>
                </div>

                <div class="mb-4 form-group">
                    <label for="review" class="form-label">Review Comments</label>
                    <textarea id="review" name="review" rows="5" class="form-control" placeholder="Share your experience with this product. What did you like or dislike?" required></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="/flipazon/all-products/" class="btn-premium btn-light border">
                        <span>Cancel</span>
                    </a>
                    <button type="submit" class="btn-premium btn-customer">
                        <i data-lucide="send" style="width: 16px; height: 16px;"></i>
                        <span>Submit Review</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
