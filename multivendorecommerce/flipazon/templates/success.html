<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Flipazon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'flipazon/dashboard.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        
        .success-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: var(--shadow-xl);
            padding: 3rem 2.5rem;
            text-align: center;
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .success-checkmark {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-full);
            background-color: #ecfdf5;
            color: #10b981;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            animation: pulseGlow 2.5s infinite;
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="success-checkmark">
        <i data-lucide="check-circle-2" style="width: 42px; height: 42px; stroke-width: 2;"></i>
    </div>
    
    <h3 class="fw-bold text-slate-900 mb-2" style="letter-spacing: -0.02em;">Success!</h3>
    <p class="text-slate-600 mb-4" style="font-size: 1.05rem;">{{ message }}</p>
    
    <a href="{{ dashboard_url }}" class="btn-premium btn-customer w-100 py-3 d-flex align-items-center justify-content-center gap-2">
        <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
        <span>Return to Dashboard</span>
    </a>
</div>

<script>
    lucide.createIcons();
    
    // Auto redirect after 4 seconds to the dashboard url
    setTimeout(() => {
        window.location.href = "{{ dashboard_url }}";
    }, 4000);
</script>
</body>
</html>
